<div class="ft-page">
  <header class="ft-page__header">
    <div class="ft-page__header-row">
      <div>
        <h1 class="ft-h2">Repetitive Movements</h1>
        <p class="ft-small ft-text-muted">Recurring and subscription movements</p>
      </div>
      <button class="ft-btn ft-btn--primary" id="btn-new-repetitive">
        <span class="material-symbols-outlined" aria-hidden="true">add</span>
        New
      </button>
    </div>
  </header>

  <!-- Filter Bar -->
  <div id="widget-repetitive-filter">
    <div class="ft-toolbar">
      <span class="ft-small ft-text-muted">Filters will be loaded here</span>
    </div>
  </div>

  <!-- Repetitive Movements List -->
  <section class="ft-section">
    <div class="ft-table-wrapper" id="widget-repetitive-list">
      <div class="ft-empty">
        <span class="ft-empty__icon material-symbols-outlined" aria-hidden="true">event_repeat</span>
        <p class="ft-small">No repetitive movements found</p>
      </div>
    </div>
  </section>
</div>
