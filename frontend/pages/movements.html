<div class="ft-page">
  <header class="ft-page__header">
    <h1 class="ft-h2">Movements</h1>
    <p class="ft-small ft-text-muted">Full history of all recorded movements</p>
  </header>

  <!-- Filter Bar -->
  <div id="widget-movements-filter">
    <div class="ft-toolbar">
      <span class="ft-small ft-text-muted">Filters will be loaded here</span>
    </div>
  </div>

  <!-- Movements Table + Pagination -->
  <section class="ft-section">
    <div class="ft-table-wrapper" id="widget-movements-table">
      <div class="ft-empty">
        <span class="ft-empty__icon material-symbols-outlined" aria-hidden="true">receipt_long</span>
        <p class="ft-small">No movements found</p>
      </div>
    </div>
    <div id="widget-movements-pagination"></div>
  </section>
</div>
