<div class="ft-page">
  <header class="ft-page__header">
    <div class="ft-page__header-row">
      <div>
        <h1 class="ft-h2">Categories</h1>
        <p class="ft-small ft-text-muted">Manage categories and subcategories</p>
      </div>
      <button class="ft-btn ft-btn--primary" id="btn-new-category">
        <span class="material-symbols-outlined" aria-hidden="true">add</span>
        New Category
      </button>
    </div>
  </header>

  <!-- Categories Grid -->
  <section class="ft-section" id="widget-categories-grid">
    <div class="ft-accounts-grid">
      <div class="ft-empty" style="grid-column: 1 / -1;">
        <span class="ft-empty__icon material-symbols-outlined" aria-hidden="true">sell</span>
        <p class="ft-small">No categories found</p>
      </div>
    </div>
  </section>
</div>
