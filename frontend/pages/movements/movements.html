<div class="ft-page">
  <header class="ft-page__header">
    <div>
      <h1 class="ft-h2">Movements</h1>
      <p class="ft-small ft-text-muted">Full history of all recorded movements</p>
    </div>
  </header>

  <!-- Toolbar (account + type toggle + date filters) -->
  <div class="ft-toolbar ft-movements-toolbar" id="widget-movements-toolbar">
    <div class="ft-movements-toolbar__field ft-movements-toolbar__field--account">
      <label class="ft-movements-toolbar__label" for="movements-account-select">Account</label>
      <select id="movements-account-select" class="ft-movements-toolbar__select"></select>
    </div>
    <div class="ft-movements-toolbar__field ft-movements-toolbar__field--type">
      <span class="ft-movements-toolbar__label">Type</span>
      <div class="ft-type-toggle" id="movements-type-toggle">
        <button class="ft-type-toggle__btn ft-type-toggle__btn--all ft-type-toggle__btn--active" data-type="">All</button>
        <button class="ft-type-toggle__btn ft-type-toggle__btn--expense" data-type="Expense">Expense</button>
        <button class="ft-type-toggle__btn ft-type-toggle__btn--income" data-type="Income">Income</button>
      </div>
    </div>
    <div class="ft-movements-toolbar__field ft-movements-toolbar__field--dates">
      <span class="ft-movements-toolbar__label">Date Range</span>
      <div class="ft-movements-toolbar__dates" id="movements-date-pickers"></div>
    </div>
    <label class="ft-movements-toolbar__toggle" for="movements-show-deleted">
      <input type="checkbox" id="movements-show-deleted" />
      <span class="ft-movements-toolbar__toggle-label">Show deleted</span>
    </label>
  </div>

  <!-- Extra Filters: name search, category, sub-category + CSV export -->
  <div id="movements-filter-bar"></div>

  <!-- Feedback -->
  <div id="widget-movements-feedback"></div>

  <!-- Code-Group Banner (shown when filtering by movement_code) -->
  <div id="widget-movements-code-banner"></div>

  <!-- Movements Grid -->
  <section class="ft-section">
    <div class="ft-table-wrapper" id="widget-movements-grid">
      <div class="ft-empty">
        <span class="ft-empty__icon material-symbols-outlined" aria-hidden="true">receipt_long</span>
        <p class="ft-small">Loading movements&#8230;</p>
      </div>
    </div>
  </section>
</div>
