<!--
  Add Movements page template.
  Smart behavior is wired by pages/add-movements/index.js after route load.

  Layout (top to bottom):
    1. Page header — title + subtitle
    2. Unified toolbar — account select, type toggle, action buttons
    3. Balance cards row — current + expected balances
    4. Feedback banner — validation errors / success messages
    5. Grid — AG Grid draft movements table
    6. Hints bar — keyboard shortcuts reference
-->
<div class="ft-page ft-add-movements-page">
  <header class="ft-page__header">
    <div>
      <h1 class="ft-h2">Add Movements</h1>
      <p class="ft-small ft-text-muted">Bulk-add new movements to any account</p>
    </div>
  </header>

  <!-- Unified Toolbar: account selector + type toggle + action buttons -->
  <div class="ft-toolbar ft-add-movements-toolbar" id="widget-add-movements-toolbar">
    <span class="ft-small ft-text-muted">Account selector will load here</span>
  </div>

  <!-- Balance summary cards -->
  <section class="ft-section">
    <div class="ft-add-movements-balance-row" id="widget-add-movements-balances"></div>
  </section>

  <!-- Mobile draft composer -->
  <section class="ft-section ft-add-movements-mobile-entry" id="widget-add-movements-mobile-entry"></section>

  <!-- Bulk Input Grid -->
  <section class="ft-section ft-add-movements-grid-section">
    <div id="widget-add-movements-feedback"></div>
    <div class="ft-add-movements-mobile-drafts" id="widget-add-movements-mobile-drafts"></div>
    <div class="ft-table-wrapper" id="widget-add-movements-grid">
      <div class="ft-empty">
        <span class="ft-empty__icon material-symbols-outlined" aria-hidden="true">post_add</span>
        <p class="ft-small">Select an account to start adding movements</p>
      </div>
    </div>
    <!-- Keyboard hints — passive reference below the grid -->
    <div class="ft-add-movements-hints" id="widget-add-movements-hints">
      <kbd>Tab</kbd> navigate · <kbd>Enter</kbd> add row · <kbd>Esc</kbd> clear · <kbd>Right-click</kbd> remove row
    </div>
  </section>
</div>
