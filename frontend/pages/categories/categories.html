<div class="ft-page ft-categories">
  <header class="ft-page__header">
    <div class="ft-page__header-row">
      <div>
        <h1 class="ft-h2">Categories</h1>
        <p class="ft-small ft-text-muted">Manage categories and subcategories</p>
      </div>
      <button class="ft-btn ft-btn--primary" id="btn-new-category">
        <span class="material-symbols-outlined" aria-hidden="true">add</span>
        New Category
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="ft-toolbar" id="widget-categories-toolbar">
    <div class="ft-categories-type-toggle" id="categories-type-toggle">
      <button class="ft-categories-type-toggle__btn ft-categories-type-toggle__btn--active" data-type="">All</button>
      <button class="ft-categories-type-toggle__btn" data-type="Income">Income</button>
      <button class="ft-categories-type-toggle__btn" data-type="Expense">Expense</button>
    </div>

    <label class="ft-categories-toolbar__deleted-toggle">
      <input type="checkbox" id="categories-show-deleted" />
      <span class="ft-small ft-text-muted">Show deleted</span>
    </label>
  </div>

  <!-- Feedback -->
  <div id="widget-categories-feedback"></div>

  <!-- Categories Grid -->
  <section class="ft-section" id="widget-categories-grid">
    <div class="ft-categories-grid">
      <div class="ft-empty" style="grid-column: 1 / -1;">
        <span class="ft-empty__icon material-symbols-outlined" aria-hidden="true">sell</span>
        <p class="ft-small">Loading categories&#8230;</p>
      </div>
    </div>
  </section>
</div>
