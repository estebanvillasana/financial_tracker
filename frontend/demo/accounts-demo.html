<!doctype html>
<html lang="en">
  <head>
    <!-- Basic document metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Tracker - Accounts Demo</title>
    <!-- Single CSS entrypoint (imports base + components + pages) -->
    <link rel="stylesheet" href="../includes/css/styles.css" />
  </head>
  <body class="ft-theme">
    <div class="ft-app-shell">
      <!-- Sidebar is now rendered by JS so it can be reused on any page -->
      <div data-component="sidebar" data-active-path="/accounts"></div>

      <!-- Page container using page-level class -->
      <main class="ft-app-shell__content ft-page-accounts ft-page-accounts--demo">
        <header class="ft-page-accounts__header">
          <div>
            <h1 class="ft-h2">Accounts</h1>
            <p class="ft-text-muted">Rendered dynamically from fake JS data &mdash; Main currency: USD</p>
          </div>
        </header>

        <div class="ft-page-accounts__toolbar" data-component="accounts-filters">
          <label class="ft-page-accounts__filter">
            <span class="ft-page-accounts__filter-label">Holder</span>
            <select class="ft-page-accounts__filter-select" data-filter="holder"></select>
          </label>
          <span class="ft-page-accounts__filter-divider"></span>
          <label class="ft-page-accounts__filter">
            <span class="ft-page-accounts__filter-label">Currency</span>
            <select class="ft-page-accounts__filter-select" data-filter="currency"></select>
          </label>
          <span class="ft-page-accounts__filter-divider"></span>
          <label class="ft-page-accounts__filter">
            <span class="ft-page-accounts__filter-label">Type</span>
            <select class="ft-page-accounts__filter-select" data-filter="type"></select>
          </label>
        </div>

        <!-- JS looks for this data attribute and injects account cards here -->
        <section data-component="accounts-list"></section>
      </main>
    </div>

    <!-- Icon library (optional visual enhancement) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Demo entry file: provides fake data and triggers rendering -->
    <script type="module" src="../includes/js/demo/accountsPageDemo.js"></script>
  </body>
</html>
