services:
  backend:
    build: ./backend
    container_name: financial-tracker-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Persistent data — same directories used by local dev (backend/data/)
      - ./backend/data/database:/app/data/database
      - ./backend/data/backups:/app/data/backups
      - ./backend/data/usd_exchange_rates:/app/data/usd_exchange_rates
      # users.json is gitignored — you manage it directly on the server
      - ./backend/users.json:/app/users.json:ro
