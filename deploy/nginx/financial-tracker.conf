# ─────────────────────────────────────────────────────────────
# Financial Tracker — Nginx config template
# ─────────────────────────────────────────────────────────────
#
# Before using this file:
#   1. Replace /path/to/financial-tracker with your actual server path
#   2. Replace tracker.example.com / finance.example.org with your real domains
#   3. Update the ssl_certificate paths to match where certbot stored your cert
#      (certbot prints the path after issuing — it's under the FIRST domain name)
#
# Place this file in:   /etc/nginx/sites-enabled/financial-tracker.conf
# Then test & reload:   nginx -t && systemctl reload nginx
#
# Issue certificates first (stop Nginx, run certbot standalone, restart Nginx):
#   systemctl stop nginx
#   certbot certonly --standalone -d tracker.example.com -d finance.example.org
#   systemctl start nginx
# ─────────────────────────────────────────────────────────────

# Rate-limit API calls (10 req/s per IP, burst up to 20)
limit_req_zone $binary_remote_addr zone=ft_api:10m rate=10r/s;

# Shared upstream for the Docker backend
upstream financial_tracker_backend {
    server 127.0.0.1:8000;
}


# ═══════════════════════════════════════════════
#  tracker.example.com  →  user-a.db
# ═══════════════════════════════════════════════

server {
    listen 80;
    server_name tracker.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tracker.example.com;

    # ── SSL ──
    # certbot stores the cert under the first domain name you passed to it.
    # Both server blocks can share the same SAN certificate.
    ssl_certificate     /etc/letsencrypt/live/tracker.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tracker.example.com/privkey.pem;

    # ── Basic Auth ──
    auth_basic "Financial Tracker";
    auth_basic_user_file /path/to/financial-tracker/.htpasswd;

    # ── Frontend (static files) ──
    root /path/to/financial-tracker/frontend;
    index index.html;

    # Per-domain config.js — serves the API key for this domain's database
    location = /config.js {
        alias /path/to/financial-tracker/deploy/configs/tracker.example.com.config.js;
        add_header Cache-Control "no-cache";
    }

    # ── API reverse proxy ──
    # /api/movements  →  http://127.0.0.1:8000/movements  (strips /api prefix)
    location /api/ {
        limit_req zone=ft_api burst=20 nodelay;

        proxy_pass http://financial_tracker_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA catch-all ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block dotfiles (.git, .env, etc.)
    location ~ /\. {
        deny all;
    }
}


# ═══════════════════════════════════════════════
#  finance.example.org  →  user-b.db
# ═══════════════════════════════════════════════

server {
    listen 80;
    server_name finance.example.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name finance.example.org;

    # ── SSL (same SAN cert — stored under the first domain's path) ──
    ssl_certificate     /etc/letsencrypt/live/tracker.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tracker.example.com/privkey.pem;

    # ── Basic Auth ──
    auth_basic "Financial Tracker";
    auth_basic_user_file /path/to/financial-tracker/.htpasswd;

    # ── Frontend (static files) ──
    root /path/to/financial-tracker/frontend;
    index index.html;

    # Per-domain config.js — serves the API key for this domain's database
    location = /config.js {
        alias /path/to/financial-tracker/deploy/configs/finance.example.org.config.js;
        add_header Cache-Control "no-cache";
    }

    # ── API reverse proxy ──
    location /api/ {
        limit_req zone=ft_api burst=20 nodelay;

        proxy_pass http://financial_tracker_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA catch-all ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}
